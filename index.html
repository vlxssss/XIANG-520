<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520 · XIANG · Self-Love Channel</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-pink: #ffb6c1;
            --deep-pink: #ff2d55;
            --text-gray: rgba(0, 0, 0, 0.6);
            /* UI Requirement: Minimalist gradient background */
            --bg-gradient: linear-gradient(180deg, #FFFFFF 0%, #FFF0F2 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            /* Font Requirement: System Sans-serif with breathing space */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
            color: #333;
        }

        /* Top Header Area */
        .header {
            position: fixed; top: 8%; width: 100%; text-align: center;
            font-size: 0.9rem; letter-spacing: 0.3em; color: var(--text-gray);
            font-weight: 300; z-index: 10;
        }

        /* Capture Area for Poster (1:1 Ratio) */
        #capture-area {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 40px;
            transition: all 0.8s ease;
        }

        /* Quote Wrapper with Animation */
        .quote-wrap {
            text-align: center; max-width: 85%; min-height: 180px;
            display: flex; flex-direction: column; justify-content: center;
            opacity: 0; transition: opacity 1s ease; position: relative;
        }

        #quote-content {
            font-size: 1.25rem; line-height: 1.8; font-weight: 400;
            letter-spacing: 0.15em; word-break: break-all;
        }

        #quote-content b { color: var(--deep-pink); font-weight: bold; }

        /* Frequency Waveform Canvas */
        .canvas-wrap {
            width: 100%; height: 60px; margin-top: 20px;
            opacity: 0; transition: opacity 1s ease;
        }

        /* Main Interaction Button (Glassmorphism) */
        .main-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 45px; border-radius: 50px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            font-size: 1.1rem; letter-spacing: 0.4em; color: var(--deep-pink);
            cursor: pointer; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20; white-space: nowrap; outline: none;
        }

        /* Button transition to bottom state */
        .main-btn.active {
            top: 85%; transform: translate(-50%, 0);
            padding: 12px 35px; font-size: 0.9rem;
            background: rgba(255, 45, 85, 0.05);
        }

        /* Footer with dynamic listener count */
        .footer {
            position: fixed; bottom: 4%; width: 100%; padding: 0 30px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.65rem; color: rgba(0,0,0,0.3); letter-spacing: 0.1em;
            pointer-events: none;
        }

        /* Poster Camera Icon */
        .camera-icon {
            position: absolute; right: -20px; bottom: -40px;
            width: 24px; height: 24px; cursor: pointer; opacity: 0.5;
            pointer-events: auto;
        }

        /* Particle Heart Effect */
        .heart {
            position: fixed; pointer-events: none;
            color: var(--primary-pink); font-size: 20px;
            animation: floatUp 1.5s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5) rotate(20deg); opacity: 0; }
        }

        /* Modal for Poster Preview */
        #poster-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        #poster-img { width: 85%; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

        <svg class="camera-icon" onclick="generatePoster()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>

        "记录灵感，哪怕是一个微小的点子也可能成就大事。",

    let initialized = false;
    let audioCtx;

    // Interaction sound synthesis
    function playSound(type = 'start') {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if(type === 'start') {
            osc.type = 'sine'; // Dial tone feel
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        } else {
            osc.type = 'triangle'; // Short click feel
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // Main interaction handler
    function handleInteraction() {
        const btn = document.getElementById('mainBtn');
        const quoteView = document.getElementById('quote-wrap');
        const waveView = document.querySelector('.canvas-wrap');

        if(!initialized) {
            btn.classList.add('active');
            btn.innerText = "同步下一频";
            playSound('start');
            
            setTimeout(() => {
                quoteView.style.opacity = 1;
                waveView.style.opacity = 1;
                nextQuote();
                initWave();
                initialized = true;
            }, 600);
        } else {
            playSound('next');
            nextQuote();
            shockWave();
            dropHeart();
        }
    }

    function nextQuote() {
        const content = document.getElementById('quote-content');
        content.style.opacity = 0;
        setTimeout(() => {
            content.innerHTML = quotes[Math.floor(Math.random() * quotes.length)];
            content.style.opacity = 1;
        }, 250);
    }

    // Dynamic listener count fluctuation
    setInterval(() => {
        const el = document.getElementById('listener-count');
        const count = parseInt(el.innerText.match(/\d+/)[0]);
        const delta = Math.random() > 0.5 ? 1 : -1;
        el.innerText = `当前有 ${count + delta} 位听众正与自己同频`;
    }, 5000);

    // Waveform Animation logic
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    let step = 0;

    function initWave() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = '#ffb6c1';
        ctx.lineWidth = 1;

        for (let i = 0; i < canvas.width; i++) {
            const y = canvas.height / 2 + Math.sin(i * 0.04 + step) * 8;
            ctx.lineTo(i, y);
        }
        ctx.stroke();
        step += 0.08;
        requestAnimationFrame(initWave);
    }

    function shockWave() { step += 10; }

    // Heart particle effect
    function dropHeart() {
        const rect = document.getElementById('mainBtn').getBoundingClientRect();
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '❤';
        heart.style.left = (rect.left + rect.width / 2 + (Math.random() * 40 - 20)) + 'px';
        heart.style.top = rect.top + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1500);
    }

    // Poster Generation
    async function generatePoster() {
        const target = document.getElementById('capture-area');
        const camera = document.querySelector('.camera-icon');
        camera.style.visibility = 'hidden';

        const posterCanvas = await html2canvas(target, {
            backgroundColor: '#FFF8F9',
            scale: 3, // High DPI
            width: target.offsetWidth,
            height: target.offsetWidth // Force square 1:1
        });

        document.getElementById('poster-img').src = posterCanvas.toDataURL('image/png');
        document.getElementById('poster-modal').style.display = 'flex';
        camera.style.visibility = 'visible';
    }
</script>
