<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520 悦己频道 · 響 LIVEHOUSE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* =========================================================
           【第一区：全局视觉基调】 
           控制网页的底色、玻璃磨砂感、字体等基础视觉。
           ========================================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000; /* ➡️ 【可调参数】：最底层背景色，#000 是纯黑 */
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            font-weight: 300; overflow: hidden; height: 100dvh;
        }

        /* 3D 渲染画布层 */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 1; }
        
        /* 磨砂玻璃遮罩层 */
        .glass-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 2;
            background: rgba(5, 5, 5, 0.2); /* ➡️ 【可调参数】：0.2 代表背景压暗 20% */
            backdrop-filter: blur(7px);     /* ➡️ 【可调参数】：磨砂质感强度 7px */
            -webkit-backdrop-filter: blur(7px);
            pointer-events: none; 
        }

        /* 顶层 UI 容器 */
        .ui-container {
            position: relative; z-index: 10; height: 100dvh;
            display: flex; flex-direction: column; align-items: center; pointer-events: none; 
        }
        .action-btn, .header, .footer { pointer-events: auto; } 

        /* 顶部标题栏 */
        .header {
            margin-top: 8vh; 
            font-size: 12px; /* ➡️ 【你调好的参数】：顶部 LIVEHOUSE 标题字号 */
            letter-spacing: 0px; color: rgba(255, 255, 255, 0.7); 
            text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .stage { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        /* =========================================================
           【第二区：核心语录文字与频谱】 
           ========================================================= */
        .quote {
            font-size: 20px; /* ➡️ 【你调好的参数】：普通语录字号放大到了 20px */
            font-weight: bold; 
            line-height: 1; /* ➡️ 【你调好的参数】：多行文字的上下间距缩紧到了 1 */
            letter-spacing: 0px; text-align: center; width: 80%; 
            color: rgba(255, 255, 255, 0.95); text-shadow: 0 2px 15px rgba(0,0,0,0.8);
            opacity: 0; transform: translateY(10px); 
            
            /* ➡️ 【可调参数】：0.8s 是文字淡入淡出的呼吸时间 */
            transition: opacity 0.8s ease, transform 0.8s ease; 
            position: absolute; top: 30%; pointer-events: auto;
        }
        .quote.visible { opacity: 1; transform: translateY(0); }

        /* 彩蛋专属高级发光样式 */
        .quote.easter-egg {
            font-size: 20px; /* ➡️ 【你调好的参数】：彩蛋字号与正文保持一致 20px */
            font-weight: bold; color: #ffb6c1; 
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8), 0 2px 10px rgba(0,0,0,0.8); 
            
            /* 🚫 【绝对防御】：强制不换行指令！手机屏幕再窄也得乖乖待在一行里！ */
            white-space: nowrap; 
        }

        /* 呼吸频谱 */
        .spectrum-container { display: flex; gap: 6px; align-items: center; height: 40px; opacity: 0; transition: opacity 1s ease; position: absolute; bottom: 30%; }
        .spectrum-container.visible { opacity: 1; }
        .bar {
            width: 1.5px; background-color: rgba(255, 182, 193, 0.9); border-radius: 2px; height: 10px; transition: height 0.1s ease;
            animation: breathe 1.5s infinite ease-in-out alternate; box-shadow: 0 0 8px rgba(255, 182, 193, 0.5);
        }
        .bar:nth-child(1) { animation-delay: 0.0s; } .bar:nth-child(2) { animation-delay: 0.3s; }
        .bar:nth-child(3) { animation-delay: 0.6s; } .bar:nth-child(4) { animation-delay: 0.4s; } .bar:nth-child(5) { animation-delay: 0.1s; }
        @keyframes breathe { 0% { transform: scaleY(0.8); opacity: 0.5; } 100% { transform: scaleY(1.5); opacity: 1; } }

        /* =========================================================
           【第三区：核心交互按钮】
           ========================================================= */
        .action-btn {
            position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            
            /* 锁定最小宽度，防止文字由4字变5字时按钮抽搐变形 */
            min-width: 180px; white-space: nowrap; text-align: center;
            
            padding: 14px 36px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 182, 193, 0.9); font-size: 15px; letter-spacing: 3px; cursor: pointer; 
            
            /* ➡️ 【可调参数】：2.5s 是第一次点击后，按钮缓缓下落的时间，越长越温柔 */
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1), background 1s, border-color 1s, box-shadow 1s; 
        }
        /* 激活后的按钮降落状态 */
        .action-btn.active {
            /* ➡️ 【可调参数】：32dvh 是按钮最终下落到的位置 */
            transform: translate(-50%, calc(-50% + 32dvh)); 
            background: rgba(255, 182, 193, 0.1); border-color: rgba(255, 182, 193, 0.3); box-shadow: 0 0 20px rgba(255, 182, 193, 0.15);
        }
        /* 点击缩放的触感反馈 */
        .action-btn:active { transform: translate(-50%, calc(-50% + 32dvh)) scale(0.95) !important; transition: transform 0.2s; }
        .action-btn:not(.active):active { transform: translate(-50%, -50%) scale(0.95) !important; transition: transform 0.2s; }

        /* 按钮内文字单独呼吸动画 */
        #btn-text { display: inline-block; transition: opacity 0.8s ease; }

        /* 底部信息区 */
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; display: flex; flex-direction: column; gap: 8px; }
        
        /* ➡️ 【新增样式】：控制爱自己的100种方式的文字显示 */
        .todo { font-size: 12px; color: rgba(255, 255, 255, 0.6); letter-spacing: 2px; }
        
        .listeners { font-size: 10px; color: rgba(255, 255, 255, 0.3); letter-spacing: 1px; }

        /* =========================================================
           【特效动画系统】：点击爱心飘散与彩蛋发射
           ========================================================= */
        .click-heart { position: absolute; color: rgba(255, 182, 193, 0.9); font-size: 16px; pointer-events: none; z-index: 20; text-shadow: 0 0 10px rgba(255, 182, 193, 0.8); }
        .float-up { animation: floatUpClick 1.5s ease-out forwards; }
        @keyframes floatUpClick { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 50% { opacity: 0.8; } 100% { transform: translate(-50%, -150px) scale(1.2); opacity: 0; } }
        .burst-out { animation: burstHeart var(--duration) cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes burstHeart { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 80% { opacity: 0.9; } 100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(calc(1turn * var(--r))); opacity: 0; } }
    </style>
</head>
<body>

    <script>
        /* =========================================================

        // ➡️ 【更新】：这里接入了你提供的完整 80 条专属语录
        const rawQuotes = [

            "19. 吃一顿精致火锅，想吃什么就点什么",
            "20. 不强迫自己合群，喜欢独处就安静享受",
            "21. 好好拍照记录生活，老了可以回忆",

            "58. 这条等吃饱再说",

            "70. 留白也是一种艺术，生活不必填得太满。",
            "71. 不需要去成为谁，只需要去认清你自己。",
            "72. 哪怕只有一点点光，也要勇敢地亮着。",
            "73. 别怕重来，每一次都是新的开始。",
            "74. 把今天过好，更好的明天自然会来。",
            "75. 去爱那些具体的人，去感受那些具体的温暖。",
            "76. 即使世界没有掌声，也要学会在属于自己的舞台起舞。",
            "77. 累了就休息",
            "78. 给自己找点爱好，打发一下时间",
            "79. 不要为几公里外和几天之后事焦虑。",
            "80. 头等大事：先把自己照顾好，再考虑其他"
        ];

        /* 【大师级净化过滤】：
           1. \d+\.\s* 自动剔除前面的 "1. "、"2. " 等数字标号
           2. 删除所有句号
           3. 遇到逗号自动变回车换行
        */
        const quotes = rawQuotes.map(q => q.replace(/^\d+\.\s*/, '').replace(/。/g, '').replace(/，/g, '<br>'));

        /* ➡️ 【你调好的参数】：3D 核心配置参数 */
        const FINAL_CONFIG = { 
            density: 35,          // 背景飘动的 3D 爱心总数 
            dissipation: 200,     // 爱心寿命时长
            brightness: 200,      // 爱心整体发光亮度
            baseSize: 40,         // 【保留】：你修改为了 40
            speedMult: 6,         // 【保留】：你修改为了 6
            voidForce: 73         // 避开屏幕中心文字的排斥力大小
        };

        /* =========================================================
           【第六大板块：3D 背景引擎引擎逻辑 (高度精简封装)】
           ========================================================= */
        const BOUND_Y = 800; const BOUND_X = 1200; 
        const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x000000, 0.002); 
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000); 
        camera.position.z = 300; 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('webgl-container').appendChild(renderer.domElement);

        const intensityMult = FINAL_CONFIG.brightness / 100; 
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(100, 200, 50); scene.add(dirLight);
        const pointLight = new THREE.PointLight(0xffb6c1, intensityMult, 500); pointLight.position.set(0, -150, 50); scene.add(pointLight);

        const x = 0, y = 0; const heartShape = new THREE.Shape();
        heartShape.moveTo(x+5, y+5); heartShape.bezierCurveTo(x+5, y+5, x+4, y, x, y); heartShape.bezierCurveTo(x-6, y, x-6, y+7, x-6, y+7);
        heartShape.bezierCurveTo(x-6, y+11, x-3, y+15.4, x+5, y+19); heartShape.bezierCurveTo(x+12, y+15.4, x+16, y+11, x+16, y+7);
        heartShape.bezierCurveTo(x+16, y+7, x+16, y, x+10, y); heartShape.bezierCurveTo(x+7, y, x+5, y+5, x+5, y+5);

        const extrudeSettings = { depth: 3, bevelEnabled: true, bevelSegments: 4, steps: 2, bevelSize: 1.5, bevelThickness: 1.5 };
        const heartGeometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
        heartGeometry.center(); heartGeometry.rotateZ(Math.PI); 

        const baseMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffb6c1, emissive: 0x3a0a15, emissiveIntensity: intensityMult, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.85
        });

        const hearts = [];
        for (let i = 0; i < FINAL_CONFIG.density; i++) {
            const mesh = new THREE.Mesh(heartGeometry, baseMaterial.clone());
            resetHeart(mesh, true); mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            scene.add(mesh); hearts.push(mesh);
        }

        function resetHeart(mesh, initRandomY = false) {
            mesh.position.x = (Math.random() - 0.5) * BOUND_X;
            mesh.position.y = initRandomY ? (Math.random() - 0.5) * BOUND_Y : -BOUND_Y/2 - 50;
            mesh.position.z = (Math.random() - 0.5) * 600 - 150; 
            const speedY = (Math.random() * 0.5 + 0.2) * (FINAL_CONFIG.speedMult / 2);
            mesh.userData = {
                scaleBase: Math.random() * 0.5 + 0.3, speedY: speedY,
                rotSpeedX: (Math.random()-0.5)*0.02, rotSpeedY: (Math.random()-0.5)*0.02, rotSpeedZ: (Math.random()-0.5)*0.02,
                life: 1.0, fadeRate: 1.0 / ((BOUND_Y + 100) / speedY)
            };
            mesh.material.opacity = 0; 
            const s = mesh.userData.scaleBase * (FINAL_CONFIG.baseSize / 10); mesh.scale.set(s, s, s);
        }

        /* 3D 摄像机推进系统 */
        let targetCameraZ = 300; let targetCameraX = 0; let targetCameraY = 0; let isZoomedIn = false;  
        function shiftCameraPerspective() {
            isZoomedIn = !isZoomedIn;
            /* ➡️ 【你调好的参数】：镜头推近为 250，拉远为 500 */
            targetCameraZ = isZoomedIn ? 250 : 500; 
            targetCameraX = (Math.random() - 0.5) * 40; targetCameraY = (Math.random() - 0.5) * 30; 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animateBg() {
            requestAnimationFrame(animateBg);
            camera.position.z += (targetCameraZ - camera.position.z) * 0.02; 
            camera.position.x += (targetCameraX - camera.position.x) * 0.02; camera.position.y += (targetCameraY - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            hearts.forEach(mesh => {
                mesh.rotation.x += mesh.userData.rotSpeedX; mesh.rotation.y += mesh.userData.rotSpeedY; mesh.rotation.z += mesh.userData.rotSpeedZ;
                mesh.position.y += mesh.userData.speedY;
                mesh.userData.life -= mesh.userData.fadeRate * (100 / FINAL_CONFIG.dissipation);
                
                let targetOpacity = Math.max(0, mesh.userData.life * 0.85);
                if (mesh.position.y > BOUND_Y/2 - 150) targetOpacity = Math.min(targetOpacity, Math.max(0, (BOUND_Y/2 - mesh.position.y) / 150) * 0.85);
                mesh.material.opacity = targetOpacity;

                const dx = mesh.position.x, dy = mesh.position.y - 50; const dist2D = Math.sqrt(dx*dx + dy*dy);
                if (dist2D < FINAL_CONFIG.voidForce * 3) {
                    const pushStrength = (FINAL_CONFIG.voidForce * 3 - dist2D) * 0.02;
                    mesh.position.x += (dx / dist2D) * pushStrength;
                    if (dy > 0) mesh.position.y += pushStrength; else mesh.position.y -= pushStrength;
                }
                if (mesh.userData.life <= 0 || mesh.position.y > BOUND_Y/2) resetHeart(mesh, false);
            });
            renderer.render(scene, camera);
        }
        animateBg();

        /* =========================================================
           【第七大板块：状态控制、防重系统与前端交互】
           ========================================================= */
        let isStarted = false; 
        let isCooldown = false; // 防抖核心锁
        let audioCtx; 
        
        // 【智能记忆防重系统】：记录最近展示的 5 句话，包含彩蛋的标识码 -1
        let recentQuotesMemory = []; 

        const btn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text'); 
        const spectrum = document.getElementById('spectrum');
        const quoteText = document.getElementById('quote-text');
        const bars = document.querySelectorAll('.bar');
        const countEl = document.getElementById('listener-count');

        function playHealingTone() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(528, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        function createClickHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'click-heart float-up'; heart.innerHTML = '❤';
            heart.style.left = x + 'px'; heart.style.top = y + 'px';
            heart.style.transform = `translate(calc(-50% + ${(Math.random() - 0.5) * 30}px), -50%)`;
            document.body.appendChild(heart); setTimeout(() => heart.remove(), 2000);
        }

        function fireEasterEggBurst() {
            const rect = btn.getBoundingClientRect();
            const startX = rect.left + rect.width / 2; const startY = rect.top;
            for(let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'click-heart burst-out'; heart.innerHTML = '❤';
                    heart.style.left = startX + 'px'; heart.style.top = startY + 'px';
                    heart.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'vw');
                    heart.style.setProperty('--ty', -(Math.random() * 120 + 30) + 'vh');
                    heart.style.setProperty('--s', Math.random() * 1.5 + 0.8);
                    heart.style.setProperty('--r', (Math.random() - 0.5) * 3);
                    heart.style.setProperty('--duration', (Math.random() * 1.5 + 1.5) + 's');
                    document.body.appendChild(heart); setTimeout(() => heart.remove(), 3500);
                }, Math.random() * 800); 
            }
        }

        function jitterSpectrum() {
            bars.forEach(bar => { bar.style.height = `${Math.random() * 30 + 10}px`; bar.style.animation = 'none'; });
            setTimeout(() => { bars.forEach(bar => { bar.style.height = '10px'; bar.style.animation = ''; }); }, 300);
        }

        // =========================================================
        // 【核心控制引擎：文字抽卡、显隐调度与同频人数生成】
        // =========================================================
        function showRandomQuote() {
            let nextQuoteHTML = "";
            let isEasterEgg = false;
            let nextIndex = -1; 

            /* ➡️ 【可调参数】：0.02 代表每次点击 2% 的概率出彩蛋 */
            if (Math.random() < 0.02 && !recentQuotesMemory.includes(-1)) {
                nextQuoteHTML = "爱，自有回「響」"; // 彩蛋文案，无逗号换行
                isEasterEgg = true;
                nextIndex = -1; // -1 是彩蛋的记忆防重识别码
            } else {
                do { 
                    nextIndex = Math.floor(Math.random() * quotes.length); 
                } while (recentQuotesMemory.includes(nextIndex));
                nextQuoteHTML = quotes[nextIndex]; 
            }

            recentQuotesMemory.push(nextIndex);
            if (recentQuotesMemory.length > 5) recentQuotesMemory.shift(); 

            /* ➡️ 【更新配置】：生成专属的同频人数，0-600 之间随机。
               (Math.random() * 601 能取到 0~600 的整数) */
            const newListeners = Math.floor(Math.random() * 601);

            if (!isStarted) {
                // 【首句极致温柔留白】：第一次点开页面时
                // ➡️ 【可调参数】：1200ms(1.2秒)。等待按钮缓缓下落到一半，第一句话才开始像晨雾一样淡入
                setTimeout(() => {
                    if (isEasterEgg) { quoteText.classList.add('easter-egg'); fireEasterEggBurst(); } 
                    else { quoteText.classList.remove('easter-egg'); }
                    
                    quoteText.innerHTML = nextQuoteHTML; 
                    countEl.innerText = newListeners; // 随同文字一同变更为随机人数
                    quoteText.classList.add('visible'); 
                }, 1200); 
            } else {
                // 【后续换句防断层机制】：后续的有效点击
                quoteText.classList.remove('visible');
                quoteText.classList.remove('easter-egg');
                
                // ➡️ 【可调参数】：500ms 后执行。等旧字快消失殆尽，塞入新文字重新淡入
                setTimeout(() => {
                    if (isEasterEgg) { quoteText.classList.add('easter-egg'); fireEasterEggBurst(); } 
                    
                    quoteText.innerHTML = nextQuoteHTML; 
                    countEl.innerText = newListeners; // 更新随机同频人数
                    quoteText.classList.add('visible'); 
                }, 500); 
            }
        }

        /* =========================================================
           【主交互触发按钮：听见内心】
           ========================================================= */
        btn.addEventListener('click', (e) => {
            if (navigator.vibrate) navigator.vibrate(15);
            
            // 🚫 【防抖锁死】：如果还在冷却时间内，点击无效，杜绝一切由于乱点导致的抖动！
            if (isCooldown) return; 
            
            // 通过防抖检测，释放出单颗物理小爱心
            const rect = btn.getBoundingClientRect();
            createClickHeart(e.clientX || rect.left + rect.width / 2, rect.top);

            // ⚠️ 立即开启全局防抖锁
            isCooldown = true;
            
            /* ➡️ 【可调参数】：防抖冷却时间控制阀。
               因为第一句话等了 1200ms 才淡入，所以首次锁定必须长一点 (2800ms)。
               后续常规换字，锁定 1500ms（1.5秒）。 */
            const cooldownTime = !isStarted ? 2800 : 1500;
            setTimeout(() => { isCooldown = false; }, cooldownTime);

            playHealingTone(); 
            jitterSpectrum();
            shiftCameraPerspective(); 

            if (!isStarted) {
                // 【第一次】被点击
                btn.classList.add('active'); // 启动下落动画
                btnText.style.opacity = '0'; // 把“听见内心”这几个字隐藏掉
                
                // ➡️ 【可调参数】：800ms 后，按钮文字换成“同步下一频”并重新显现
                setTimeout(() => { 
                    btnText.innerText = "同步下一频"; 
                    btnText.style.opacity = '1'; 
                    spectrum.classList.add('visible'); // 让粉色呼吸小光柱浮现
                }, 800); 

                showRandomQuote(); // 执行首句温柔浮现
                isStarted = true;  
            } else {
                // 【以后】被点击
                showRandomQuote();
            }
        });
    </script>
</body>
</html>
